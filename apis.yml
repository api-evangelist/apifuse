    name: Apifuse API
    description: >-
      The Apifuse API enables developers to programmatically manage embedded
      integrations, connectors, workflows, and user authentication within their
      SaaS applications. Build and monitor native integration marketplaces with
      full programmatic control over the integration lifecycle.
