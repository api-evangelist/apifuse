naftiko: 1.0.0-alpha2
info:
  label: Apifuse API — Analytics
  description: 'Apifuse API — Analytics. 1 operations. Lead operation: Apifuse Get Analytics. Self-contained Naftiko capability
    covering one Apifuse business surface.'
  tags:
  - Apifuse
  - Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIFUSE_API_KEY: APIFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apifuse-analytics
    baseUri: https://api.apifuse.io
    description: Apifuse API — Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics
      path: /analytics
      operations:
      - name: getanalytics
        method: GET
        description: Apifuse Get Analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Start date for analytics period (ISO 8601 date).
        - name: endDate
          in: query
          type: string
          description: End date for analytics period (ISO 8601 date).
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.APIFUSE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apifuse-analytics-rest
    port: 8080
    description: REST adapter for Apifuse API — Analytics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/analytics
      name: analytics
      description: REST surface for analytics.
      operations:
      - method: GET
        name: getanalytics
        description: Apifuse Get Analytics
        call: apifuse-analytics.getanalytics
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apifuse-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apifuse API — Analytics. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: apifuse-get-analytics
      description: Apifuse Get Analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apifuse-analytics.getanalytics
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
