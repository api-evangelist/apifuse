naftiko: 1.0.0-alpha2
info:
  label: Apifuse API — Users
  description: 'Apifuse API — Users. 1 operations. Lead operation: Apifuse List Users. Self-contained Naftiko capability covering
    one Apifuse business surface.'
  tags:
  - Apifuse
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIFUSE_API_KEY: APIFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apifuse-users
    baseUri: https://api.apifuse.io
    description: Apifuse API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Apifuse List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.APIFUSE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apifuse-users-rest
    port: 8080
    description: REST adapter for Apifuse API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Apifuse List Users
        call: apifuse-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apifuse-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apifuse API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: apifuse-list-users
      description: Apifuse List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apifuse-users.listusers
      outputParameters:
      - type: object
        mapping: $.
