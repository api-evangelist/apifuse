naftiko: 1.0.0-alpha2
info:
  label: Apifuse API — Connectors
  description: 'Apifuse API — Connectors. 1 operations. Lead operation: Apifuse List Connectors. Self-contained Naftiko capability
    covering one Apifuse business surface.'
  tags:
  - Apifuse
  - Connectors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIFUSE_API_KEY: APIFUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apifuse-connectors
    baseUri: https://api.apifuse.io
    description: Apifuse API — Connectors business capability. Self-contained, no shared references.
    resources:
    - name: connectors
      path: /connectors
      operations:
      - name: listconnectors
        method: GET
        description: Apifuse List Connectors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter connectors by category.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.APIFUSE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apifuse-connectors-rest
    port: 8080
    description: REST adapter for Apifuse API — Connectors. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/connectors
      name: connectors
      description: REST surface for connectors.
      operations:
      - method: GET
        name: listconnectors
        description: Apifuse List Connectors
        call: apifuse-connectors.listconnectors
        with:
          category: rest.category
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apifuse-connectors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apifuse API — Connectors. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: apifuse-list-connectors
      description: Apifuse List Connectors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apifuse-connectors.listconnectors
      with:
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
